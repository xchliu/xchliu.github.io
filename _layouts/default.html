<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ page.title }} | {{ site.title }}</title>
    <link href="https://cdn.bootcss.com/twitter-bootstrap/4.3.1/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.bootcss.com/font-awesome/5.9.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/adagio.css">
    <style>
        body { padding-top: 60px; background: #f5f5f5; }
        .post-content { max-width: 720px; margin: 0 auto; padding: 30px; background: #fff; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,.08); }
        .post-content h1 { font-size: 1.6rem; margin-bottom: 0.5rem; }
        .post-content h2 { font-size: 1.3rem; margin-top: 1.5rem; }
        .post-content h3 { font-size: 1.1rem; margin-top: 1.2rem; }
        .post-meta { color: #888; font-size: 0.9rem; margin-bottom: 1.5rem; }
        .post-footer { margin-top: 2rem; padding-top: 1rem; border-top: 1px solid #eee; font-size: 0.85rem; }
        nav { background: #fff; border-bottom: 1px solid #e0e0e0; }
        nav a { color: #333; }
        nav a:hover { color: #007bff; text-decoration: none; }
        pre { background: #f8f9fa; padding: 12px; border-radius: 4px; overflow-x: auto; }
        code { font-size: 0.9em; }
        blockquote { border-left: 3px solid #007bff; padding-left: 12px; color: #666; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand fixed-top">
        <div class="container">
            <a class="navbar-brand" href="/">{{ site.title }}</a>
            <div class="navbar-nav ml-auto">
                <a class="nav-link" href="/">首页</a>
                <a class="nav-link" href="/about/">关于</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="post-content">
            <h1>{{ page.title }}</h1>
            {% if page.date %}
            <div class="post-meta">
                <i class="far fa-calendar-alt"></i> {{ page.date | date: "%Y-%m-%d" }}
                {% if page.categories %}
                · <i class="far fa-folder"></i> {{ page.categories | join: ", " }}
                {% endif %}
            </div>
            {% endif %}
            <div>
                {{ content }}
            </div>
            <div class="post-footer text-center">
                <a href="/">&larr; 返回首页</a>
            </div>
        </div>
    </div>
</body>
</html>
